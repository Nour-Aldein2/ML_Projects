<line class="grid" x1="850.0" y1="84" x2="850.0" y2="356"/>
<text class="axis" x="850.0" y="382" text-anchor="middle">20</text>
<line class="baseline" x1="270" y1="356" x2="850" y2="356"/>
<text class="text" x="42" y="100">Linear Regression</text>
<line x1="270" y1="96" x2="270.0" y2="96" stroke="#f1eee7" stroke-width="2"/>
<circle cx="270.0" cy="96" r="6.5" fill="white" stroke="#2E6F8E" stroke-width="2.4"/>
<text class="small" x="282.0" y="100">0</text>
<text class="text" x="42" y="134">Logistic Regression</text>
<line x1="270" y1="130" x2="270.0" y2="130" stroke="#f1eee7" stroke-width="2"/>
<circle cx="270.0" cy="130" r="6.5" fill="white" stroke="#B45F3C" stroke-width="2.4"/>
<text class="small" x="282.0" y="134">0</text>
<text class="text" x="42" y="168">KNN</text>
<line x1="270" y1="164" x2="270.0" y2="164" stroke="#f1eee7" stroke-width="2"/>
<circle cx="270.0" cy="164" r="6.5" fill="white" stroke="#B45F3C" stroke-width="2.4"/>
<text class="small" x="282.0" y="168">0</text>
<text class="text" x="42" y="202">SVM</text>
<line x1="270" y1="198" x2="270.0" y2="198" stroke="#f1eee7" stroke-width="2"/>
<circle cx="270.0" cy="198" r="6.5" fill="white" stroke="#B45F3C" stroke-width="2.4"/>
<text class="small" x="282.0" y="202">0</text>
<text class="text" x="42" y="236">Decision Trees &amp; RF</text>
<line x1="270" y1="232" x2="270.0" y2="232" stroke="#f1eee7" stroke-width="2"/>
<circle cx="270.0" cy="232" r="6.5" fill="white" stroke="#B45F3C" stroke-width="2.4"/>
<text class="small" x="282.0" y="236">0</text>
<text class="text" x="42" y="270">K-Means</text>
<line x1="270" y1="266" x2="415.0" y2="266" stroke="#f1eee7" stroke-width="2"/>
<circle cx="415.0" cy="266" r="6.5" fill="white" stroke="#3F7D5A" stroke-width="2.4"/>
