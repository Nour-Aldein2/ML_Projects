<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img">
<style>
.title{font:700 26px Arial,Helvetica,sans-serif;fill:#20262e}
.subtitle{font:400 13px Arial,Helvetica,sans-serif;fill:#66717d}
.label{font:700 12px Arial,Helvetica,sans-serif;fill:#20262e}
.text{font:400 12px Arial,Helvetica,sans-serif;fill:#20262e}
.small{font:400 11px Arial,Helvetica,sans-serif;fill:#66717d}
.tiny{font:400 10px Arial,Helvetica,sans-serif;fill:#66717d}
.num{font:700 32px Arial,Helvetica,sans-serif;fill:#20262e}
.axis{font:400 10px Arial,Helvetica,sans-serif;fill:#66717d}
.grid{stroke:#ded9cc;stroke-width:1;shape-rendering:crispEdges}
.baseline{stroke:#20262e;stroke-width:1.1;shape-rendering:crispEdges}
.soft{fill:#f7f3ea;stroke:#ded9cc;stroke-width:1.2}
</style>
<text class="title" x="42" y="42">Feature-Engineering Depth</text>
<text class="subtitle" x="42" y="64">Named helper functions found in notebooks. Titanic and LendingClub show the deepest custom engineering.</text>
<line class="grid" x1="270.0" y1="84" x2="270.0" y2="356"/>
<text class="axis" x="270.0" y="382" text-anchor="middle">0</text>
<line class="grid" x1="415.0" y1="84" x2="415.0" y2="356"/>
<text class="axis" x="415.0" y="382" text-anchor="middle">5</text>
<line class="grid" x1="560.0" y1="84" x2="560.0" y2="356"/>
<text class="axis" x="560.0" y="382" text-anchor="middle">10</text>
<line class="grid" x1="705.0" y1="84" x2="705.0" y2="356"/>
