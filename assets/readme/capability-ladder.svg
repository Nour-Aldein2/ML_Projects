<path d="M732 120 C790 90, 760 130, 806 100" fill="none" stroke="#ded9cc" stroke-width="2" stroke-linecap="round"/>
<circle cx="850" cy="100" r="24" fill="white" stroke="#6B5CA5" stroke-width="3"/>
<text class="label" x="850" y="156" text-anchor="middle">Deep learning</text>
