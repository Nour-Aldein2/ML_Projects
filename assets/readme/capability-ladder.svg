<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img">
<style>
.title{font:700 26px Arial,Helvetica,sans-serif;fill:#20262e}
.subtitle{font:400 13px Arial,Helvetica,sans-serif;fill:#66717d}
.label{font:700 12px Arial,Helvetica,sans-serif;fill:#20262e}
.text{font:400 12px Arial,Helvetica,sans-serif;fill:#20262e}
.small{font:400 11px Arial,Helvetica,sans-serif;fill:#66717d}
.tiny{font:400 10px Arial,Helvetica,sans-serif;fill:#66717d}
.num{font:700 32px Arial,Helvetica,sans-serif;fill:#20262e}
.axis{font:400 10px Arial,Helvetica,sans-serif;fill:#66717d}
.grid{stroke:#ded9cc;stroke-width:1;shape-rendering:crispEdges}
.baseline{stroke:#20262e;stroke-width:1.1;shape-rendering:crispEdges}
.sketch{fill:none;stroke:#20262e;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.soft{fill:#f7f3ea;stroke:#ded9cc;stroke-width:1.2}
</style>
<rect class="figure-bg" x="0" y="0" width="960" height="360" fill="#ffffff" stroke="#d9dee7" stroke-width="1"/>
<text class="title" x="42" y="42">Capability Ladder</text>
<text class="subtitle" x="42" y="64">The repository moves from interpretable baselines to custom algorithms, Kaggle feature engineering, and neural networks.</text>
<circle cx="120" cy="260" r="24" fill="white" stroke="#2E6F8E" stroke-width="3"/>
<text class="label" x="120" y="316" text-anchor="middle">Baselines</text>
<text class="tiny" x="120" y="334" text-anchor="middle">Linear
Logistic</text>
<path d="M162 240 C220 210, 220 250, 266 220" fill="none" stroke="#ded9cc" stroke-width="2" stroke-linecap="round"/>
<circle cx="310" cy="220" r="24" fill="white" stroke="#B45F3C" stroke-width="3"/>
<text class="label" x="310" y="276" text-anchor="middle">Classifiers</text>
<text class="tiny" x="310" y="294" text-anchor="middle">KNN
SVM
RF</text>
<path d="M352 200 C410 170, 410 210, 456 180" fill="none" stroke="#ded9cc" stroke-width="2" stroke-linecap="round"/>
<circle cx="500" cy="180" r="24" fill="white" stroke="#3F7D5A" stroke-width="3"/>
<text class="label" x="500" y="236" text-anchor="middle">Algorithms</text>
<text class="tiny" x="500" y="254" text-anchor="middle">K-Means
from scratch</text>
<path d="M542 160 C600 130, 600 170, 646 140" fill="none" stroke="#ded9cc" stroke-width="2" stroke-linecap="round"/>
<circle cx="690" cy="140" r="24" fill="white" stroke="#B45F3C" stroke-width="3"/>
<text class="label" x="690" y="196" text-anchor="middle">Kaggle workflow</text>
